<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>

<body>
    <form action="/processa-dados" method="post">

        <fieldset>
            <h3>Dados Pessoais</h3>
            <label for="nome">Nome: </label>
            <input type="text" id="nome" name="nome"><br><br>

            <label for="email">E-mail: </label>
            <input type="text" id="email" email="E-mail"><br><br>

            <label for="data-nasc">Data de Nascimento: </label>
            <input type="date" id="data-nasc" name="data-nasc"><br><br>

        </fieldset>
        <br>
        <fieldset>
            <h3>Endereço</h3>
            <label for="Endereço">Endereço </label>
            <input type="text" id="Endereço" email="Endereço"><br><br>

            <label for="CEP">CEP:</label>
            <input type="text" pattern="\d{5}-\d{3}" title="CEP no formato XXXXX-XXX"><br><br>

            <label for="RUA">RUA/AV: </label>
            <input type="text" id="Rua" rua="Rua"><br><br>

            <label for="Bairro"> Bairro:</label>
            <input type="text" id="CEP" Bairro="Bairro"><br><br>

        </fieldset>

        <label for="quantidade">Quantidade: </label>
        <input type="number" id="quantidade" name="quantidade" min="1" max="10"><br><br>

        <label for="foto-perfil">Escolha sua foto: </label>
        <input type="file" id="foto-perfil" name="foto-perfil"><br><br>

        <label for="cor-preferida"> Escolha sua cor: </label>
        <input type="color" id="cor-preferida" name="cor-preferida"><br><br>

        <label for="telefone">Telefone: </label>
        <input type="number" id="telefone" Telefone="Telefone"><br><br>

        <fieldset>
            <h3>Deixe Sua mensagem</h3>
            <label for="assunto">Assunto: </label>
            <select id="assunto" name="assunto_msg" required>
                <option value="">--Escolha--</option>
                <option value="duvida">Dúvida</option>
                <option value="pedido">Pedido</option>
            </select>

            <input type="button" value="CLique para ver mensagem" onclick="alert('Olá')"><br><br>

        </fieldset>

        <input type="checkbox" id="newsletter" name="newsletter" value=="sim">
        <label for="newsletter"> Quero receber novidades</label><br><br>

        <input type="submit" value="Enviar Dados"><br><br>
        <input type="reset" value="Limpar Formulário"><br><br>
    </form>
</body>

</html>
