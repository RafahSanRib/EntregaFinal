</head>
<body>
      <header class="main-header">
        <img src="/EntregaFinal/Padaria do Bairro/logo/logo.jpg" class="header-logo">
        <section class="secao-destaque">
            <div class="container">
                <h1 align="">Padaria Ebenezer</h1>
                <p>Tradição e sabor de caseiro! Que alegra o coração desde infância!</p>
                
                <nav class="main-nav">
                    <ul>
                       <li><a href="index.html">Home</a></li>

                    </ul>
                </nav>
            </div>
        </section>
    </header>
    <section class="avaliacao-cliente">
        <h2>Avaliação de Atendimento</h2>

        <form action="#" method="post">

            <!-- Nome -->
            <div class="form-group">
                <label for="nome">👤 Nome</label>
                <input type="text" id="nome" name="nome" placeholder="Digite seu nome (opcional)">
            </div>

            <!-- Email -->
            <div class="form-group">
                <label for="email">📧 Email</label>
                <input type="email" id="email" name="email" placeholder="Digite seu email (opcional)">
            </div>

            <!-- Produto / Serviço -->
            <div class="form-group">
                <label for="produto">🍞 Produto / Serviço</label>
                <select id="produto" name="produto" required>
                    <option value="">Selecione uma opção</option>
                    <option value="paes">Pães</option>
                    <option value="doces">Doces</option>
                    <option value="salgados">Salgados</option>
                    <option value="atendimento">Atendimento</option>
                </select>
            </div>

            <!-- Avaliação Geral -->
            <fieldset class="form-group">
                <legend>🔵 Avaliação Geral</legend>

                <label>
                    <input type="radio" name="avaliacao" value="excelente" required>
                    Excelente
                </label>

                <label>
                    <input type="radio" name="avaliacao" value="bom">
                    Bom
                </label>

                <label>
                    <input type="radio" name="avaliacao" value="ruim">
                    Ruim
                </label>
            </fieldset>

            <!-- Botão -->
            <button type="submit">Enviar Avaliação</button>

        </form>
    </section>
    <script src="js/script.js"></script>
    
</body>
</html>
