<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
</head>
<body>
    <header>
        <h1 align="">Padaria Ebenezer</h1>
        <p>Tradição e sabor de caseiro! Que alegra o coração desde infância!</p>
        <img src="fachada/ChatGPT Image 19 de jan. de 2026, 22_21_38.jpg" width="800" height="500">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="contato.html">Contato</a></li>
                <li><a href="pedido.html">Pedido</a></li>
                <li><a href="cadastro.html">Cadastro</a></li>
            </ul>
        </nav>
    </header>
    <form action="/processa-dados" method="post">
        <fieldset>
            <legend>Dados Pessoais</legend>
            <label for="nome">Nome: </label>
            <input type="text" id="nome" name="nome" required><br><br>

            <label for="email">E-mail: </label>
            <input type="text" id="email" email="E-mail" required><br><br>

            
            <fieldset>
                <h3>Deixe Sua mensagem</h3>
                <label for="assunto">Assunto: </label>
                <select id="assunto" name="assunto_msg" required>
                    <option value="">--Escolha--</option>
                    <option value="duvida">Dúvida</option>
                    <option value="pedido">Pedido</option>
                </select>
                <input type="button" value="CLique para ver mensagem" onclick="alert('Olá')" required><br><br>
                <label for="mensagem">Mensagem:</label><br><br><br>
                <textarea id="mensagem" name="mensagem" rows="5" cols="33"
                    placeholder="Deixe sua mensagem..."></textarea>
            </fieldset>
            <input type="submit" value="Enviar Dados"><br><br>
            <input type="reset" value="Limpar Formulário"><br><br>
        </fieldset>
    </form>
</body>
</html>
